<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Job Search HQ — Luis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg:#f0f5ff;--surface:#fff;--surface2:#e4edff;
  --border:rgba(99,140,255,0.15);--border2:rgba(99,140,255,0.28);
  --text:#1a3260;--text2:#4a6fa5;--text3:#8ba4cc;
  --accent:#2563eb;--radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
#root{max-width:840px;margin:0 auto;padding:0 1.5rem 4rem}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px;width:100%;transition:border-color 0.15s;box-shadow:0 1px 3px rgba(37,99,235,0.06)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
textarea{resize:vertical;line-height:1.6}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;padding:9px 18px;transition:all 0.15s}
button:hover{background:var(--surface2);border-color:var(--accent)}
button:active{transform:scale(0.98)}
button:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500;box-shadow:0 2px 8px rgba(37,99,235,0.25)}
.btn-primary:hover{opacity:0.9;background:var(--accent);box-shadow:0 4px 12px rgba(37,99,235,0.35)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;box-shadow:0 2px 12px rgba(37,99,235,0.07)}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px}
.skill-tag{background:#dbeafe;color:#1e40af;border-radius:20px;font-size:12px;padding:3px 10px;display:inline-block;margin:2px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem;text-align:center;box-shadow:0 2px 10px rgba(37,99,235,0.08)}
.metric-val{font-size:28px;font-weight:600;display:block;color:var(--accent)}
.metric-lbl{font-size:12px;color:var(--text2);display:block;margin-top:2px;font-weight:500}
.nav{display:flex;border-bottom:1px solid var(--border);margin-bottom:2rem;gap:4px}
.nav-btn{padding:11px 20px;font-size:13px;font-weight:500;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;border-radius:0;transition:all 0.15s}
.nav-btn:hover{background:none;color:var(--accent)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.header{display:flex;justify-content:space-between;align-items:center;padding:1.75rem 0 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.75rem}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--accent);color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:14px;font-weight:500;z-index:999;animation:slideUp 0.2s ease;box-shadow:0 4px 16px rgba(37,99,235,0.35)}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.score-bar-bg{background:#dbeafe;border-radius:20px;height:6px;flex:1}
.score-bar-fill{height:6px;border-radius:20px;transition:width 0.4s ease}
.overall-circle{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2.5px solid}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const TRACKS = ["Business Analytics","Supply Chain","Financial Analytics","General"];
const STATUSES = ["Saved","Applied","Interview","Offer","Rejected"];
const STATUS_COLORS = {
  Saved:    {bg:"#E6F1FB",color:"#0C447C"},
  Applied:  {bg:"#FAEEDA",color:"#633806"},
  Interview:{bg:"#E1F5EE",color:"#085041"},
  Offer:    {bg:"#EAF3DE",color:"#27500A"},
  Rejected: {bg:"#FCEBEB",color:"#791F1F"}
};
const LUIS_PROFILE = `
CANDIDATE PROFILE — Luis Miranda Morales:
- Degree: BS Business Analytics & Technology, Trinity University (May 2027), GPA 3.25
- Triple Minor: Data Science, Finance, Supply Chain Management
- Technical skills: Python (Pandas, NumPy, Scikit-learn), SQL (MySQL, PostgreSQL, Snowflake), R, Tableau, Power BI, Excel (advanced)
- Certifications: ML (Udemy), Excel Expert, MySQL
- Experience: VC intern (Capital Factory — analyzed 500+ startups), Financial Data Analyst intern (Groe Solutions — SQL workflows on 174K records, Tableau dashboards), Incoming Banking & Financial Analytics intern (TransPecos Banks)
- Projects: Business analytics competition (Python ML, text mining), Dell supply chain disruption analysis, Climate ML project (XGBoost, Random Forest)
- Leadership: Alpha Kappa Psi VP of Operations & Recruitment
- Location preference: Texas — Austin > Houston > San Antonio > Dallas
- Career goals: Prestige company, strong learning/growth culture, rotational or early career programs preferred
- GPA note: 3.25 — competitive for analytics roles, may be screened out by strict 3.5+ finance/banking firms
- Languages: English and Spanish (fluent)
`;
function scoreColor(score) {
  if (score >= 8) return {fill:"#1D9E75",text:"#085041",bg:"#E1F5EE"};
  if (score >= 6) return {fill:"#639922",text:"#27500A",bg:"#EAF3DE"};
  if (score >= 4) return {fill:"#BA7517",text:"#633806",bg:"#FAEEDA"};
  return {fill:"#E24B4A",text:"#791F1F",bg:"#FCEBEB"};
}
function MatchScorecard({ match }) {
  if (!match) return null;
  const overall = Math.round((match.skill_match + match.interest + match.background + match.growth + match.location) / 5);
  const oc = scoreColor(overall);
  const dims = [
    {key:"skill_match", label:"Skill match", icon:"ti-code"},
    {key:"interest",    label:"My interest",  icon:"ti-heart"},
    {key:"background",  label:"Background fit",icon:"ti-user"},
    {key:"growth",      label:"Growth potential",icon:"ti-trending-up"},
    {key:"location",    label:"Location fit",  icon:"ti-map-pin"},
  ];
  return (
    <div style={{marginTop:"1rem",paddingTop:"1rem",borderTop:"0.5px solid var(--border)"}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:"1rem"}}>
        <div className="overall-circle" style={{borderColor:oc.fill,background:oc.bg}}>
          <span style={{fontSize:22,fontWeight:500,color:oc.text,lineHeight:1}}>{overall}</span>
          <span style={{fontSize:10,color:oc.text,opacity:0.8}}>/10</span>
        </div>
        <div>
          <p style={{fontWeight:500,fontSize:15}}>Match for Luis</p>
          <p style={{fontSize:13,color:"var(--text2)"}}>{overall>=8?"Strong fit — worth prioritizing":overall>=6?"Good fit — solid opportunity":overall>=4?"Partial fit — consider carefully":"Weak fit — may not be worth it"}</p>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {dims.map(d => {
          const val = match[d.key] || 0;
          const c = scoreColor(val);
          return (
            <div key={d.key}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                <i className={`ti ${d.icon}`} style={{fontSize:13,color:"var(--text2)",width:14}} aria-hidden="true"/>
                <span style={{fontSize:13,color:"var(--text2)",width:110,flexShrink:0}}>{d.label}</span>
                <div className="score-bar-bg">
                  <div className="score-bar-fill" style={{width:`${val*10}%`,background:c.fill}}/>
                </div>
                <span style={{fontSize:13,fontWeight:500,color:c.text,width:24,textAlign:"right"}}>{val}</span>
              </div>
              {match[d.key+"_reason"] && (
                <p style={{fontSize:12,color:"var(--text3)",marginLeft:22,lineHeight:1.5}}>{match[d.key+"_reason"]}</p>
              )}
            </div>
          );
        })}
      </div>
      {match.gpa_flag && (
        <div style={{marginTop:"0.75rem",background:"#FAEEDA",borderRadius:"10px",padding:"8px 12px",fontSize:12,color:"#633806"}}>
          <i className="ti ti-alert-triangle" style={{marginRight:5}} aria-hidden="true"/>
          {match.gpa_flag}
        </div>
      )}
    </div>
  );
}
function Badge({status}){
  const c=STATUS_COLORS[status]||STATUS_COLORS.Saved;
  return <span className="badge" style={{background:c.bg,color:c.color}}>{status}</span>;
}
function Toast({msg}){
  return <div className="toast"><i className="ti ti-check" style={{marginRight:6}}/>{ msg}</div>;
}
function SettingsScreen({apiKey,onSave}){
  const [val,setVal]=useState(apiKey||"");
  return (
    <div style={{maxWidth:520}}>
      <div className="card">
        <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:"1.25rem"}}>
          <i className="ti ti-lock" style={{fontSize:22,color:"var(--text2)",marginTop:2}}/>
          <div>
            <p style={{fontWeight:500,marginBottom:4}}>Anthropic API key</p>
            <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.6}}>Stored only in your browser's localStorage. Never sent anywhere except Anthropic's API directly.</p>
          </div>
        </div>
        <input type="text" placeholder="sk-ant-api03-..." value={val} onChange={e=>setVal(e.target.value.trim())} style={{marginBottom:"0.5rem",fontFamily:"monospace",fontSize:13}}/>
        {val&&!val.startsWith("sk-ant-")&&<p style={{fontSize:12,color:"#A32D2D",background:"#FCEBEB",padding:"6px 10px",borderRadius:6,marginBottom:"0.5rem"}}>Key looks wrong — should start with sk-ant-</p>}
        {val&&val.startsWith("sk-ant-")&&<p style={{fontSize:12,color:"#0F6E56",background:"#E1F5EE",padding:"6px 10px",borderRadius:6,marginBottom:"0.5rem"}}>Key format looks correct</p>}
        <button className="btn-primary" style={{width:"100%",marginTop:"0.25rem"}} onClick={()=>onSave(val.trim())}>Save and continue</button>
        <p style={{fontSize:12,color:"var(--text3)",marginTop:"0.75rem",textAlign:"center"}}>Get your key at <strong>console.anthropic.com</strong> → API Keys</p>
      </div>
      <div className="card" style={{marginTop:"1rem"}}>
        <p style={{fontWeight:500,marginBottom:"0.75rem"}}>Coming soon</p>
        {[["ti-file-text","Resume tailor — match your resume keywords to any job"],["ti-brand-linkedin","LinkedIn outreach — find connections and draft messages"],["ti-file-download","Export tracker — download applications as CSV"]].map(([icon,text])=>(
          <div key={text} style={{display:"flex",gap:10,alignItems:"center",color:"var(--text2)",fontSize:14,marginBottom:8}}>
            <i className={`ti ${icon}`} style={{fontSize:16}}/>
            <span>{text}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
function IntakeScreen({apiKey,onJobSaved}){
  const [inputMode,setInputMode]=useState("text");
  const [url,setUrl]=useState("");
  const [text,setText]=useState("");
  const [track,setTrack]=useState("Business Analytics");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  // Quick add
  const [showQuickAdd,setShowQuickAdd]=useState(false);
  const [qaUrl,setQaUrl]=useState("");
  const [qaRole,setQaRole]=useState("");
  const [qaCompany,setQaCompany]=useState("");
  const [qaTrack,setQaTrack]=useState("Business Analytics");

  async function analyze(){
    const cleanKey=(apiKey||"").trim();
    if(!cleanKey){setError("Add your API key in Settings first.");return;}
    if(!cleanKey.startsWith("sk-ant-")){setError("API key looks wrong — check Settings.");return;}
    const input=inputMode==="url"?`Job posting URL: ${url}`:text;
    if(!input.trim()){setError("Paste a job description or URL first.");return;}
    setError("");setLoading(true);setResult(null);
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":cleanKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-5",
          max_tokens:1500,
          messages:[{role:"user",content:`Analyze this job posting for a specific candidate and return ONLY valid JSON, no markdown, no explanation.
${LUIS_PROFILE}
Return this exact JSON schema:
{
  "company": string,
  "role": string,
  "location": string,
  "type": "Full-time" or "Internship" or "Contract",
  "salary": string or null,
  "summary": string (2-3 sentence overview),
  "required_skills": string[] (max 8),
  "nice_to_haves": string[] (max 5),
  "fit_notes": string (1-2 sentences on what makes a strong candidate),
  "match": {
    "skill_match": number 1-10 (how well Luis's Python/SQL/Tableau/ML skills match requirements),
    "skill_match_reason": string (one short sentence),
    "interest": number 1-10 (alignment with his analytics/finance/supply chain interests),
    "interest_reason": string (one short sentence),
    "background": number 1-10 (how well his VC/financial analyst/ML project experience fits),
    "background_reason": string (one short sentence),
    "growth": number 1-10 (learning culture, rotational programs, career trajectory),
    "growth_reason": string (one short sentence),
    "location": number 1-10 (10=Austin TX, 9=Houston TX, 8=San Antonio TX, 7=Dallas TX, 5=other TX, 3=remote, 1=out of state),
    "location_reason": string (one short sentence),
    "gpa_flag": string or null (warn if role likely requires 3.5+ GPA, otherwise null)
  }
}
Job posting:
${input}`}]
        })
      });
      const data=await resp.json();
      if(data.error){
        const msg=data.error.message||JSON.stringify(data.error);
        setError(data.error.type==="authentication_error"?"Invalid API key — go to Settings and re-paste it.":"Anthropic error: "+msg);
        setLoading(false);return;
      }
      const raw=data.content[0].text.replace(/```json|```/g,"").trim();
      setResult(JSON.parse(raw));
    }catch(e){
      setError("Error: "+e.message);
    }
    setLoading(false);
  }
  function saveAnalyzed(){
    if(!result)return;
    const jobs=JSON.parse(localStorage.getItem("jsc_jobs")||"[]");
    jobs.unshift({id:Date.now(),...result,track,status:"Saved",savedAt:new Date().toLocaleDateString(),appliedAt:null,notes:"",url:inputMode==="url"?url:""});
    localStorage.setItem("jsc_jobs",JSON.stringify(jobs));
    setResult(null);setText("");setUrl("");
    onJobSaved(result.role+" at "+result.company);
  }
  function quickAdd(){
    if(!qaUrl.trim()&&!qaRole.trim()){setError("Paste a link or enter a role name.");return;}
    const jobs=JSON.parse(localStorage.getItem("jsc_jobs")||"[]");
    jobs.unshift({id:Date.now(),role:qaRole.trim()||"Untitled role",company:qaCompany.trim()||"—",location:"—",type:"Full-time",salary:null,summary:"",required_skills:[],nice_to_haves:[],fit_notes:"",match:null,track:qaTrack,status:"Saved",savedAt:new Date().toLocaleDateString(),appliedAt:null,notes:"",url:qaUrl.trim()});
    localStorage.setItem("jsc_jobs",JSON.stringify(jobs));
    const label=(qaRole.trim()||"Role")+(qaCompany.trim()?" at "+qaCompany.trim():"");
    setQaUrl("");setQaRole("");setQaCompany("");setShowQuickAdd(false);setError("");
    onJobSaved(label);
  }

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:"1rem"}}>
        <button onClick={()=>setInputMode("text")} style={inputMode==="text"?{background:"var(--surface2)",fontWeight:500,borderColor:"var(--accent)"}:{}}><i className="ti ti-align-left" style={{marginRight:6}}/>Paste description</button>
        <button onClick={()=>setInputMode("url")} style={inputMode==="url"?{background:"var(--surface2)",fontWeight:500,borderColor:"var(--accent)"}:{}}><i className="ti ti-link" style={{marginRight:6}}/>Paste URL</button>
      </div>
      {inputMode==="text"
        ?<textarea rows={8} placeholder="Paste the full job description here..." value={text} onChange={e=>setText(e.target.value)} style={{marginBottom:"0.75rem"}}/>
        :<input placeholder="https://company.com/careers/role..." value={url} onChange={e=>setUrl(e.target.value)} style={{marginBottom:"0.75rem"}}/>
      }
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:"0.75rem"}}>
        <label style={{fontSize:13,color:"var(--text2)",whiteSpace:"nowrap",fontWeight:500}}>Track:</label>
        <select value={track} onChange={e=>setTrack(e.target.value)}>
          {TRACKS.map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
      {error&&<p style={{fontSize:13,color:"#A32D2D",marginBottom:"0.75rem",padding:"8px 12px",background:"#FCEBEB",borderRadius:"var(--radius)"}}>{error}</p>}
      <button className="btn-primary" onClick={analyze} disabled={loading} style={{width:"100%",marginBottom:"0.75rem",padding:"11px"}}>
        {loading?<><i className="ti ti-loader" style={{marginRight:6}}/>Analyzing with Claude...</>:<><i className="ti ti-sparkles" style={{marginRight:6}}/>Analyze job</>}
      </button>
      <button onClick={()=>{setShowQuickAdd(v=>!v);setError("");}} style={{width:"100%",padding:"10px",marginBottom:"1.5rem",background:"transparent",border:"1.5px dashed var(--border2)",borderRadius:"var(--radius)",color:"var(--text2)",fontWeight:500,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"background 0.15s"}}>
        <i className="ti ti-bookmark" style={{fontSize:15}}/>{showQuickAdd?"Cancel":"Add to list — bookmark without analyzing"}
      </button>

      {showQuickAdd&&(
        <div className="card" style={{marginBottom:"1.5rem",border:"1.5px solid var(--border2)"}}>
          <p style={{fontSize:13,color:"var(--text2)",marginBottom:"1rem",lineHeight:1.6}}>Paste the link and optionally name the role. You can always analyze it later from your tracker.</p>
          <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
            <div>
              <label style={{fontSize:12,fontWeight:500,color:"var(--text2)",display:"block",marginBottom:4}}>Job URL</label>
              <input placeholder="https://..." value={qaUrl} onChange={e=>setQaUrl(e.target.value)} autoFocus/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.75rem"}}>
              <div>
                <label style={{fontSize:12,fontWeight:500,color:"var(--text2)",display:"block",marginBottom:4}}>Role (optional)</label>
                <input placeholder="Data Analyst" value={qaRole} onChange={e=>setQaRole(e.target.value)}/>
              </div>
              <div>
                <label style={{fontSize:12,fontWeight:500,color:"var(--text2)",display:"block",marginBottom:4}}>Company (optional)</label>
                <input placeholder="Acme Corp" value={qaCompany} onChange={e=>setQaCompany(e.target.value)}/>
              </div>
            </div>
            <div>
              <label style={{fontSize:12,fontWeight:500,color:"var(--text2)",display:"block",marginBottom:4}}>Track</label>
              <select value={qaTrack} onChange={e=>setQaTrack(e.target.value)} style={{width:"100%"}}>
                {TRACKS.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
          </div>
          {error&&<p style={{fontSize:13,color:"#A32D2D",marginTop:"0.75rem",padding:"8px 12px",background:"#FCEBEB",borderRadius:"var(--radius)"}}>{error}</p>}
          <button className="btn-primary" onClick={quickAdd} style={{width:"100%",padding:"11px",marginTop:"1rem"}}>
            <i className="ti ti-bookmark" style={{marginRight:6}}/>Save to list
          </button>
        </div>
      )}

      {result&&(
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1rem"}}>
            <div>
              <p style={{fontWeight:500,fontSize:17,marginBottom:3}}>{result.role}</p>
              <p style={{fontSize:14,color:"var(--text2)"}}>{result.company} · {result.location} · {result.type}</p>
              {result.salary&&<p style={{fontSize:13,color:"var(--text2)",marginTop:2}}>{result.salary}</p>}
            </div>
            <span className="badge" style={{background:"var(--surface2)",color:"var(--text2)",marginTop:3}}>{track}</span>
          </div>
          <p style={{fontSize:14,lineHeight:1.75,color:"var(--text2)",marginBottom:"1rem",paddingBottom:"1rem",borderBottom:"1px solid var(--border)"}}>{result.summary}</p>
          <div style={{marginBottom:"0.75rem"}}>
            <p style={{fontSize:12,fontWeight:500,color:"var(--text2)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Required skills</p>
            <div>{result.required_skills?.map(s=><span key={s} className="skill-tag">{s}</span>)}</div>
          </div>
          {result.nice_to_haves?.length>0&&(
            <div style={{marginBottom:"0.75rem"}}>
              <p style={{fontSize:12,fontWeight:500,color:"var(--text2)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Nice to have</p>
              <div>{result.nice_to_haves.map(s=><span key={s} className="skill-tag" style={{background:"var(--surface2)",color:"var(--text2)"}}>{s}</span>)}</div>
            </div>
          )}
          {result.fit_notes&&(
            <div style={{background:"var(--surface2)",borderRadius:"var(--radius)",padding:"12px 14px",marginTop:"0.75rem"}}>
              <p style={{fontSize:12,fontWeight:500,color:"var(--text2)",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.05em"}}>What they're looking for</p>
              <p style={{fontSize:13,lineHeight:1.7}}>{result.fit_notes}</p>
            </div>
          )}
          <MatchScorecard match={result.match}/>
          <button className="btn-primary" onClick={saveAnalyzed} style={{width:"100%",padding:"11px",marginTop:"1rem"}}>
            <i className="ti ti-plus" style={{marginRight:6}}/>Save to tracker
          </button>
        </div>
      )}
    </div>
  );
}
function TrackerScreen(){
  const [jobs,setJobs]=useState([]);
  const [filter,setFilter]=useState("All");
  const [trackFilter,setTrackFilter]=useState("All");
  const [expandedId,setExpandedId]=useState(null);
  useEffect(()=>{setJobs(JSON.parse(localStorage.getItem("jsc_jobs")||"[]"));},[]);
  function updateStatus(id,status){
    const updated=jobs.map(j=>j.id===id?{...j,status,appliedAt:status==="Applied"?new Date().toLocaleDateString():j.appliedAt}:j);
    setJobs(updated);localStorage.setItem("jsc_jobs",JSON.stringify(updated));
  }
  function updateNotes(id,notes){
    const updated=jobs.map(j=>j.id===id?{...j,notes}:j);
    setJobs(updated);localStorage.setItem("jsc_jobs",JSON.stringify(updated));
  }
  function deleteJob(id){
    if(!confirm("Remove this job from your tracker?"))return;
    const updated=jobs.filter(j=>j.id!==id);
    setJobs(updated);localStorage.setItem("jsc_jobs",JSON.stringify(updated));
  }
  const filtered=jobs.filter(j=>{
    const s=filter==="All"||j.status===filter;
    const t=trackFilter==="All"||j.track===trackFilter;
    return s&&t;
  });
  const counts=STATUSES.reduce((acc,s)=>({...acc,[s]:jobs.filter(j=>j.status===s).length}),{});
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:"1.5rem"}}>
        {[["Total",jobs.length],["Applied",counts.Applied],["Interview",counts.Interview],["Offers",counts.Offer]].map(([l,v])=>(
          <div key={l} className="metric"><span className="metric-val">{v}</span><span className="metric-lbl">{l}</span></div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:"1.25rem",flexWrap:"wrap"}}>
        <select value={filter} onChange={e=>setFilter(e.target.value)} style={{width:"auto"}}>
          <option value="All">All statuses</option>
          {STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={trackFilter} onChange={e=>setTrackFilter(e.target.value)} style={{width:"auto"}}>
          <option value="All">All tracks</option>
          {TRACKS.map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
      {filtered.length===0
        ?<div style={{textAlign:"center",padding:"4rem 0",color:"var(--text3)"}}>
          <i className="ti ti-briefcase" style={{fontSize:36,display:"block",marginBottom:12}}/>
          <p style={{fontSize:15,fontWeight:500,marginBottom:4}}>No jobs here yet</p>
          <p style={{fontSize:13}}>Add your first job in the Add Job tab</p>
        </div>
        :<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(job=>{
            const overall=job.match?Math.round((job.match.skill_match+job.match.interest+job.match.background+job.match.growth+job.match.location)/5):null;
            const oc=overall?scoreColor(overall):null;
            return (
              <div key={job.id} className="card">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                      <p style={{fontWeight:500,fontSize:15}}>{job.role}</p>
                      <Badge status={job.status}/>
                      <span className="badge" style={{background:"#F1EFE8",color:"#5F5E5A"}}>{job.track}</span>
                      {overall&&<span className="badge" style={{background:oc.bg,color:oc.text}}>Match {overall}/10</span>}
                    </div>
                    <p style={{fontSize:13,color:"var(--text2)"}}>{job.company} · {job.location}</p>
                    <p style={{fontSize:12,color:"var(--text3)",marginTop:2}}>Saved {job.savedAt}{job.appliedAt?` · Applied ${job.appliedAt}`:""}</p>
                  </div>
                  <div style={{display:"flex",gap:4,marginLeft:8}}>
                    <button onClick={()=>setExpandedId(expandedId===job.id?null:job.id)} style={{border:"none",background:"none",color:"var(--text2)",padding:4}}>
                      <i className={`ti ${expandedId===job.id?"ti-chevron-up":"ti-chevron-down"}`} style={{fontSize:16}}/>
                    </button>
                    <button onClick={()=>deleteJob(job.id)} style={{border:"none",background:"none",color:"var(--text3)",padding:4}}>
                      <i className="ti ti-trash" style={{fontSize:16}}/>
                    </button>
                  </div>
                </div>
                <div style={{marginTop:"0.75rem",display:"flex",gap:6,flexWrap:"wrap"}}>
                  {STATUSES.map(s=>(
                    <button key={s} onClick={()=>updateStatus(job.id,s)}
                      style={{fontSize:12,padding:"4px 12px",background:job.status===s?STATUS_COLORS[s].bg:"transparent",color:job.status===s?STATUS_COLORS[s].color:"var(--text2)",borderColor:job.status===s?"transparent":"var(--border)",fontWeight:job.status===s?500:400}}>
                      {s}
                    </button>
                  ))}
                </div>
                {expandedId===job.id&&(
                  <div style={{marginTop:"1rem",paddingTop:"1rem",borderTop:"0.5px solid var(--border)"}}>
                    {job.match&&<MatchScorecard match={job.match}/>}
                    {job.required_skills?.length>0&&(
                      <div style={{marginBottom:"0.75rem",marginTop:job.match?"1rem":"0"}}>
                        <p style={{fontSize:12,fontWeight:500,color:"var(--text2)",marginBottom:5}}>Required skills</p>
                        <div>{job.required_skills.map(s=><span key={s} className="skill-tag">{s}</span>)}</div>
                      </div>
                    )}
                    <div>
                      <p style={{fontSize:12,fontWeight:500,color:"var(--text2)",marginBottom:5}}>Notes</p>
                      <textarea rows={3} placeholder="Interview dates, contacts, follow-up notes..." value={job.notes||""} onChange={e=>updateNotes(job.id,e.target.value)}/>
                    </div>
                    {job.url&&<a href={job.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:13,color:"#0C447C",marginTop:"0.5rem",textDecoration:"none"}}><i className="ti ti-external-link" style={{fontSize:14}}/>View original posting</a>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      }
    </div>
  );
}
function ResumeScreen({apiKey,tailorJob,onClearTailorJob}){
  const [baseResume,setBaseResume]=useState(()=>localStorage.getItem("jsc_resume")||"");
  const [editing,setEditing]=useState(!localStorage.getItem("jsc_resume"));
  const [draft,setDraft]=useState(()=>localStorage.getItem("jsc_resume")||"");
  const [jobs]=useState(()=>JSON.parse(localStorage.getItem("jsc_jobs")||"[]"));
  const [selectedJobId,setSelectedJobId]=useState(tailorJob?.id||null);
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const [copied,setCopied]=useState(false);
  const [showAddExp,setShowAddExp]=useState(false);
  const [expCompany,setExpCompany]=useState("");
  const [expRole,setExpRole]=useState("");
  const [expDates,setExpDates]=useState("");
  const [expBullets,setExpBullets]=useState("");

  useEffect(()=>{if(tailorJob){setSelectedJobId(tailorJob.id);}},[tailorJob]);

  function saveResume(){localStorage.setItem("jsc_resume",draft);setBaseResume(draft);setEditing(false);}

  function addExperience(){
    if(!expCompany.trim()&&!expRole.trim())return;
    const block=`\n${expRole.trim()}${expCompany.trim()?" | "+expCompany.trim():""}\n${expDates.trim()}\n${expBullets.split("\n").map(b=>b.trim()?"• "+b.trim():"").filter(Boolean).join("\n")}`;
    const updated=(baseResume+block).trim();
    setDraft(updated);setBaseResume(updated);localStorage.setItem("jsc_resume",updated);
    setExpCompany("");setExpRole("");setExpDates("");setExpBullets("");setShowAddExp(false);
  }

  async function tailor(){
    const cleanKey=(apiKey||"").trim();
    if(!cleanKey){setError("Add your API key in Settings first.");return;}
    if(!cleanKey.startsWith("sk-ant-")){setError("API key looks wrong — check Settings.");return;}
    if(!baseResume.trim()){setError("Save your resume above first.");return;}
    const job=jobs.find(j=>j.id===selectedJobId);
    if(!job){setError("Select a job to tailor to.");return;}
    setLoading(true);setError("");setResult(null);
    const jobCtx=`Role: ${job.role}\nCompany: ${job.company}\nLocation: ${job.location}\nType: ${job.type}\n${job.summary?"Summary: "+job.summary+"\n":""}Required skills: ${job.required_skills?.join(", ")||"N/A"}\nNice to have: ${job.nice_to_haves?.join(", ")||"N/A"}\n${job.fit_notes?"What they're looking for: "+job.fit_notes:""}`;
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":cleanKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:3000,messages:[{role:"user",content:`You are a resume coach helping a college senior tailor their resume for a specific job. Return ONLY valid JSON, no markdown, no explanation.

CANDIDATE RESUME:
${baseResume}

TARGET JOB:
${jobCtx}

Return this exact JSON schema:
{
  "missing_keywords": string[] (keywords/skills in the job that are absent from the resume, max 10),
  "present_keywords": string[] (important keywords from the job already in the resume, max 8),
  "bullet_rewrites": [{"original": string, "rewritten": string (XYZ format: Accomplished [X] as measured by [Y], by doing [Z]), "reason": string}] (3-5 most impactful rewrites),
  "tailored_resume": string (full resume text with rewrites applied and missing keywords woven in where truthful),
  "top_tip": string (one high-impact piece of advice specific to this application)
}`}]})
      });
      const data=await resp.json();
      if(data.error){setError("Anthropic error: "+(data.error.message||JSON.stringify(data.error)));setLoading(false);return;}
      const raw=data.content[0].text.replace(/```json|```/g,"").trim();
      setResult(JSON.parse(raw));
    }catch(e){setError("Error: "+e.message);}
    setLoading(false);
  }

  function copyResume(){
    if(!result?.tailored_resume)return;
    navigator.clipboard.writeText(result.tailored_resume).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  }

  const selectedJob=jobs.find(j=>j.id===selectedJobId);

  return (
    <div>
      <div className="card" style={{marginBottom:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
          <p style={{fontWeight:500,fontSize:15}}>Your base resume</p>
          {!editing&&baseResume&&(
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setShowAddExp(v=>!v)} style={{fontSize:12,padding:"4px 10px",color:"var(--text2)"}}>
                <i className="ti ti-plus" style={{marginRight:4}}/>Add experience
              </button>
              <button onClick={()=>{setDraft(baseResume);setEditing(true);}} style={{fontSize:12,padding:"4px 10px",color:"var(--text2)"}}>
                <i className="ti ti-pencil" style={{marginRight:4}}/>Edit
              </button>
            </div>
          )}
        </div>
        {editing||!baseResume?(
          <>
            <textarea rows={14} placeholder={"Paste your full resume here as plain text.\n\nInclude all sections: skills, experience, education, projects."} value={draft} onChange={e=>setDraft(e.target.value)} style={{marginBottom:"0.75rem",fontFamily:"monospace",fontSize:12,lineHeight:1.6}}/>
            <div style={{display:"flex",gap:8}}>
              <button className="btn-primary" onClick={saveResume} style={{flex:1,padding:"9px"}}><i className="ti ti-device-floppy" style={{marginRight:6}}/>Save resume</button>
              {baseResume&&<button onClick={()=>setEditing(false)} style={{padding:"9px 16px"}}>Cancel</button>}
            </div>
          </>
        ):(
          <div style={{background:"var(--surface2)",borderRadius:"var(--radius)",padding:"12px 14px",maxHeight:180,overflowY:"auto"}}>
            <pre style={{fontSize:12,lineHeight:1.65,whiteSpace:"pre-wrap",color:"var(--text)",margin:0,fontFamily:"monospace"}}>{baseResume}</pre>
          </div>
        )}
      </div>

      {showAddExp&&(
        <div className="card" style={{marginBottom:"1rem",border:"1.5px dashed var(--border2)"}}>
          <p style={{fontWeight:500,fontSize:14,marginBottom:"0.75rem"}}>Add new experience</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.75rem",marginBottom:"0.75rem"}}>
            <div><label style={{fontSize:12,fontWeight:500,color:"var(--text2)",display:"block",marginBottom:4}}>Role / Title</label><input placeholder="Data Analyst Intern" value={expRole} onChange={e=>setExpRole(e.target.value)}/></div>
            <div><label style={{fontSize:12,fontWeight:500,color:"var(--text2)",display:"block",marginBottom:4}}>Company</label><input placeholder="Acme Corp" value={expCompany} onChange={e=>setExpCompany(e.target.value)}/></div>
          </div>
          <div style={{marginBottom:"0.75rem"}}><label style={{fontSize:12,fontWeight:500,color:"var(--text2)",display:"block",marginBottom:4}}>Dates</label><input placeholder="May 2025 – Aug 2025" value={expDates} onChange={e=>setExpDates(e.target.value)}/></div>
          <div style={{marginBottom:"0.75rem"}}><label style={{fontSize:12,fontWeight:500,color:"var(--text2)",display:"block",marginBottom:4}}>Bullet points (one per line)</label><textarea rows={4} placeholder={"Built dashboard tracking KPIs for 3 product lines\nReduced report time by 40%"} value={expBullets} onChange={e=>setExpBullets(e.target.value)}/></div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-primary" onClick={addExperience} style={{flex:1,padding:"9px"}}>Add to resume</button>
            <button onClick={()=>setShowAddExp(false)} style={{padding:"9px 16px"}}>Cancel</button>
          </div>
        </div>
      )}

      {baseResume&&(
        <div className="card" style={{marginBottom:"1rem"}}>
          <p style={{fontWeight:500,fontSize:15,marginBottom:"0.75rem"}}>Tailor to a job</p>
          {tailorJob?(
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"0.75rem",background:"var(--surface2)",borderRadius:"var(--radius)",padding:"10px 14px"}}>
              <i className="ti ti-briefcase" style={{color:"var(--accent)",fontSize:16}}/>
              <div style={{flex:1}}><p style={{fontWeight:500,fontSize:13}}>{tailorJob.role}</p><p style={{fontSize:12,color:"var(--text2)"}}>{tailorJob.company}</p></div>
              <button onClick={onClearTailorJob} style={{fontSize:12,color:"var(--text2)",padding:"4px 8px"}}>Change</button>
            </div>
          ):(
            <select value={selectedJobId||""} onChange={e=>setSelectedJobId(Number(e.target.value))} style={{width:"100%",marginBottom:"0.75rem"}}>
              <option value="">Select a saved job...</option>
              {jobs.map(j=><option key={j.id} value={j.id}>{j.role} — {j.company}</option>)}
            </select>
          )}
          {error&&<p style={{fontSize:13,color:"#A32D2D",marginBottom:"0.75rem",padding:"8px 12px",background:"#FCEBEB",borderRadius:"var(--radius)"}}>{error}</p>}
          <button className="btn-primary" onClick={tailor} disabled={loading||!selectedJobId} style={{width:"100%",padding:"11px"}}>
            {loading?<><i className="ti ti-loader" style={{marginRight:6}}/>Tailoring your resume...</>:<><i className="ti ti-wand" style={{marginRight:6}}/>Tailor resume</>}
          </button>
        </div>
      )}

      {result&&(
        <div>
          {result.top_tip&&(
            <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:"var(--radius)",padding:"12px 14px",marginBottom:"1rem",display:"flex",gap:10,alignItems:"flex-start"}}>
              <i className="ti ti-bulb" style={{color:"var(--accent)",fontSize:16,marginTop:2}}/>
              <p style={{fontSize:13,lineHeight:1.6,color:"var(--text)"}}>{result.top_tip}</p>
            </div>
          )}
          <div className="card" style={{marginBottom:"1rem"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}}>
              <div>
                <p style={{fontSize:12,fontWeight:500,color:"#A32D2D",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Missing keywords</p>
                <div>{result.missing_keywords?.map(k=><span key={k} style={{display:"inline-block",fontSize:12,padding:"3px 9px",borderRadius:20,background:"#FEECED",color:"#A32D2D",margin:"2px"}}>{k}</span>)}</div>
              </div>
              <div>
                <p style={{fontSize:12,fontWeight:500,color:"#166534",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Already present</p>
                <div>{result.present_keywords?.map(k=><span key={k} style={{display:"inline-block",fontSize:12,padding:"3px 9px",borderRadius:20,background:"#DCFCE7",color:"#166534",margin:"2px"}}>{k}</span>)}</div>
              </div>
            </div>
          </div>
          {result.bullet_rewrites?.length>0&&(
            <div className="card" style={{marginBottom:"1rem"}}>
              <p style={{fontWeight:500,fontSize:14,marginBottom:"1rem"}}>Bullet rewrites <span style={{fontSize:12,color:"var(--text2)",fontWeight:400}}>XYZ format</span></p>
              <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
                {result.bullet_rewrites.map((b,i)=>(
                  <div key={i} style={{paddingBottom:"1rem",borderBottom:i<result.bullet_rewrites.length-1?"1px solid var(--border)":"none"}}>
                    <p style={{fontSize:12,color:"var(--text3)",marginBottom:5,textDecoration:"line-through"}}>{b.original}</p>
                    <p style={{fontSize:13,color:"var(--text)",fontWeight:500,marginBottom:4}}>→ {b.rewritten}</p>
                    <p style={{fontSize:12,color:"var(--text2)",lineHeight:1.5}}>{b.reason}</p>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
              <p style={{fontWeight:500,fontSize:14}}>Tailored resume</p>
              <button onClick={copyResume} style={{fontSize:12,padding:"5px 12px",color:copied?"#166534":"var(--text2)",background:copied?"#DCFCE7":"transparent",border:"1px solid",borderColor:copied?"#166534":"var(--border)"}}>
                <i className={`ti ${copied?"ti-check":"ti-copy"}`} style={{marginRight:5}}/>{copied?"Copied!":"Copy text"}
              </button>
            </div>
            <pre style={{fontSize:12,lineHeight:1.65,whiteSpace:"pre-wrap",color:"var(--text)",background:"var(--surface2)",borderRadius:"var(--radius)",padding:"12px 14px",maxHeight:420,overflowY:"auto",fontFamily:"monospace"}}>{result.tailored_resume}</pre>
          </div>
        </div>
      )}
    </div>
  );
}
function App(){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("jsc_key")||"");
  const [tab,setTab]=useState(()=>localStorage.getItem("jsc_key")?"intake":"settings");
  const [toast,setToast]=useState("");
  function saveKey(k){localStorage.setItem("jsc_key",k);setApiKey(k);showToast("API key saved");setTab("intake");}
  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2500);}
  function handleJobSaved(label){showToast("Saved: "+label);setTab("tracker");}
  return (
    <div>
      <div className="header">
        <div style={{textAlign:"center",flex:1}}>
          <p style={{fontWeight:700,fontSize:34,letterSpacing:"-0.02em",color:"#2563eb"}}>Job Search HQ</p>
          <p style={{fontSize:13,color:"var(--text2)",marginTop:2}}>Luis's recruiting command center</p>
        </div>
        <button onClick={()=>setTab("settings")} style={{border:"none",background:"none",color:"var(--text2)",padding:6}}>
          <i className="ti ti-settings" style={{fontSize:20}}/>
        </button>
      </div>
      <nav className="nav">
        {[["intake","ti-plus","Add job"],["tracker","ti-chart-bar","Tracker"],["settings","ti-settings","Settings"]].map(([t,icon,label])=>(
          <button key={t} className={`nav-btn${tab===t?" active":""}`} onClick={()=>setTab(t)}>
            <i className={`ti ${icon}`} style={{marginRight:6}}/>{label}
          </button>
        ))}
      </nav>
      {tab==="settings"&&<SettingsScreen apiKey={apiKey} onSave={saveKey}/>}
      {tab==="intake"&&<IntakeScreen apiKey={apiKey} onJobSaved={handleJobSaved}/>}
      {tab==="tracker"&&<TrackerScreen/>}
      {toast&&<Toast msg={toast}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
